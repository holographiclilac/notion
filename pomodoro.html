<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Fofo & Intuitivo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
            font-family: 'Playfair Display', Georgia, serif;
        }

        .centrador {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pomodoro-box {
            background-color: #ffffff;
            border-radius: 16px; 
            box-shadow: 0px 4px 20px rgba(120, 80, 180, 0.08); 
            padding: 25px 35px;
            text-align: center;
            width: 300px;
            color: #c9b8e8; 
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Botão de Configurações */
        .btn-settings {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: rgba(201, 184, 232, 0.7);
            transition: transform 0.3s ease, color 0.3s ease;
        }
        .btn-settings:hover {
            color: #a58fd6;
            transform: rotate(90deg);
        }

        /* Painel de Configurações Oculto */
        .settings-panel {
            display: none;
            width: 100%;
            background: #fcfaff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(201, 184, 232, 0.3);
        }
        .settings-panel.active {
            display: block;
        }
        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .input-group input {
            width: 60px;
            padding: 5px;
            border: 1px solid #c9b8e8;
            border-radius: 4px;
            text-align: center;
            color: #a58fd6;
            font-weight: bold;
            font-family: inherit;
        }
        .btn-save {
            width: 100%;
            background: #c9b8e8;
            color: white;
            border: none;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        #mode {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 600;
            margin-bottom: 15px;
            color: rgba(201, 184, 232, 0.9);
        }

        /* --- ALINHAMENTO MATEMÁTICO DO CÍRCULO E NÚMERO --- */
        .timer-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
            /* Tiramos o flexbox daqui para usar o posicionamento absoluto perfeito */
        }

        .progress-ring {
            position: absolute;
            top: 0; left: 0;
            transform: rotate(-90deg); 
            transform-origin: center;
        }
        
        .progress-ring__circle-bg {
            stroke: rgba(201, 184, 232, 0.1); 
        }
        
        .progress-ring__circle {
            stroke: #c9b8e8; 
            stroke-linecap: round; 
            transition: stroke-dashoffset 0.3s linear; 
        }

        #timer {
            position: absolute;
            top: 50%;
            left: 50%;
            /* Força o centro exato dos eixos X e Y */
            transform: translate(-50%, -50%);
            /* Ajuste óptico fino para compensar o peso da fonte na base */
            margin-top: -3px; 
            font-size: 3.2rem;
            font-weight: 600;
            line-height: 1;
            color: #a58fd6; 
            z-index: 10; 
            text-align: center;
        }
        /* --------------------------------------------------- */

        /* Switch Lofi */
        .lofi-toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            color: #a58fd6;
        }
        .lofi-toggle-container input {
            accent-color: #c9b8e8;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        button.ctrl-btn {
            border: none;
            padding: 8px 14px;
            border-radius: 8px; 
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            flex: 1 1 40%; 
        }
        button.ctrl-btn:active { transform: scale(0.96); }

        /* Cores Pastéis dos Botões */
        #btn-start { color: #6bc295; background-color: #e0f7ea; }
        #btn-pause { color: #e69d73; background-color: #fff3e6; }
        #btn-reset { color: #e6a0a0; background-color: #ffe5e5; }
        #btn-skip  { color: #9a80d4; background-color: #eee8fc; } 

        .tracker-container {
            width: 100%;
            min-height: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-top: 1px solid rgba(201, 184, 232, 0.2);
            padding-top: 10px;
        }

        #tomatoes {
            font-size: 1.4rem;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        #clear-tomatoes {
            font-size: 0.7rem;
            color: rgba(201, 184, 232, 0.7);
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            font-weight: 400;
            text-decoration: underline;
        }
        #clear-tomatoes:hover { color: #a58fd6; }

        #youtube-player-container {
            position: absolute;
            width: 0; height: 0;
            overflow: hidden;
        }
    </style>
    
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div class="centrador">
        <div class="pomodoro-box">
            <button class="btn-settings" id="btn-settings" title="Configurações">⚙️</button>
            
            <div class="settings-panel" id="settings-panel">
                <div class="input-group">
                    <label>Foco (min):</label>
                    <input type="number" id="input-work" min="1" max="120" value="25">
                </div>
                <div class="input-group">
                    <label>Pausa (min):</label>
                    <input type="number" id="input-break" min="1" max="60" value="5">
                </div>
                <button class="btn-save" id="btn-save">Salvar Tempos</button>
            </div>

            <div id="mode">Tempo de Foco</div>
            
            <div class="timer-container">
                <svg class="progress-ring" width="180" height="180">
                    <circle class="progress-ring__circle-bg" stroke-width="8" fill="transparent" r="80" cx="90" cy="90"/>
                    <circle class="progress-ring__circle" stroke-width="8" fill="transparent" r="80" cx="90" cy="90"/>
                </svg>
                <div id="timer">25:00</div>
            </div>

            <label class="lofi-toggle-container">
                <input type="checkbox" id="lofi-toggle" checked>
                🎧 Rádio Lofi Automática
            </label>
            
            <div class="controls">
                <button id="btn-start" class="ctrl-btn">▶ Iniciar</button>
                <button id="btn-pause" class="ctrl-btn">⏸ Pausar</button>
                <button id="btn-skip" class="ctrl-btn">⏭ Pular</button>
                <button id="btn-reset" class="ctrl-btn">🔄 Zerar</button>
            </div>

            <div class="tracker-container">
                <div id="tomatoes"></div>
                <button id="clear-tomatoes">Limpar tomates</button>
            </div>
        </div>
    </div>

    <script>
        let WORK_TIME = localStorage.getItem('pomoWorkTime') ? parseInt(localStorage.getItem('pomoWorkTime')) : 25;
        let BREAK_TIME = localStorage.getItem('pomoBreakTime') ? parseInt(localStorage.getItem('pomoBreakTime')) : 5;
        let completedSessions = localStorage.getItem('pomodoroTomatoes') ? parseInt(localStorage.getItem('pomodoroTomatoes')) : 0;

        document.getElementById('input-work').value = WORK_TIME;
        document.getElementById('input-break').value = BREAK_TIME;

        let totalTime = WORK_TIME * 60; 
        let timeLeft = totalTime; 
        let timerId = null;
        let isWorkMode = true;

        const timerDisplay = document.getElementById('timer');
        const modeDisplay = document.getElementById('mode');
        const tomatoesDisplay = document.getElementById('tomatoes');
        const lofiToggle = document.getElementById('lofi-toggle');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(frequency, type, duration, delay = 0) {
            setTimeout(() => {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = type;
                osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            }, delay);
        }

        function play1MinWarning() {
            playTone(600, 'sine', 0.4, 0);
            playTone(600, 'sine', 0.4, 300);
        }

        function playPhaseEnd() {
            playTone(440, 'sine', 0.3, 0);    
            playTone(554.37, 'sine', 0.3, 200); 
            playTone(659.25, 'sine', 0.6, 400); 
        }

        let ytPlayer;
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                height: '10', width: '10',
                videoId: 'jfKfPfyJRdk', 
                playerVars: { 'autoplay': 0, 'controls': 0, 'showinfo': 0, 'rel': 0 },
            });
        }

        function handleMusic(action) {
            if (!ytPlayer || typeof ytPlayer.playVideo !== 'function') return;
            if (action === 'play' && lofiToggle.checked && isWorkMode) {
                ytPlayer.setVolume(35);
                ytPlayer.playVideo();
            } else {
                ytPlayer.pauseVideo();
            }
        }

        const circle = document.querySelector('.progress-ring__circle');
        const radius = circle.r.baseVal.value;
        const circumference = 2 * Math.PI * radius; 

        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = circumference; 

        function setProgress(percent) {
            const offset = circumference * (1 - percent);
            circle.style.strokeDashoffset = offset;
        }

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            setProgress(timeLeft / totalTime);
        }

        function renderTomatoes() {
            tomatoesDisplay.innerHTML = '🍅'.repeat(completedSessions);
            document.getElementById('clear-tomatoes').style.display = completedSessions > 0 ? 'block' : 'none';
        }

        function toggleMode() {
            handleMusic('pause'); 
            
            if (isWorkMode) {
                completedSessions++;
                localStorage.setItem('pomodoroTomatoes', completedSessions);
                renderTomatoes();
                
                isWorkMode = false;
                totalTime = BREAK_TIME * 60;
                timeLeft = totalTime;
                modeDisplay.textContent = 'Pausa Curta';
            } else {
                isWorkMode = true;
                totalTime = WORK_TIME * 60;
                timeLeft = totalTime;
                modeDisplay.textContent = 'Tempo de Foco';
            }
            updateDisplay();
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
            if (timerId !== null) return; 
            
            handleMusic('play'); 

            timerId = setInterval(() => {
                timeLeft--;
                
                if (timeLeft === 60) play1MinWarning(); 
                
                if (timeLeft < 0) {
                    clearInterval(timerId);
                    timerId = null;
                    playPhaseEnd(); 
                    toggleMode();
                } else {
                    updateDisplay();
                }
            }, 1000); 
        });

        document.getElementById('btn-pause').addEventListener('click', () => {
            clearInterval(timerId);
            timerId = null;
            handleMusic('pause');
        });

        document.getElementById('btn-skip').addEventListener('click', () => {
            clearInterval(timerId);
            timerId = null;
            toggleMode(); 
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            clearInterval(timerId);
            timerId = null;
            isWorkMode = true;
            totalTime = WORK_TIME * 60; 
            timeLeft = totalTime;
            modeDisplay.textContent = 'Tempo de Foco';
            handleMusic('pause');
            updateDisplay();
        });

        document.getElementById('clear-tomatoes').addEventListener('click', () => {
            completedSessions = 0;
            localStorage.setItem('pomodoroTomatoes', 0);
            renderTomatoes();
        });

        document.getElementById('btn-settings').addEventListener('click', () => {
            document.getElementById('settings-panel').classList.toggle('active');
        });

        document.getElementById('btn-save').addEventListener('click', () => {
            let newWork = parseInt(document.getElementById('input-work').value);
            let newBreak = parseInt(document.getElementById('input-break').value);
            
            if (newWork > 0 && newBreak > 0) {
                WORK_TIME = newWork;
                BREAK_TIME = newBreak;
                localStorage.setItem('pomoWorkTime', WORK_TIME);
                localStorage.setItem('pomoBreakTime', BREAK_TIME);
                
                document.getElementById('settings-panel').classList.remove('active');
                document.getElementById('btn-reset').click(); 
            }
        });

        updateDisplay();
        renderTomatoes();
    </script>
</body>
</html>
