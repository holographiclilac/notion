<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semana de Produção</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .centrador {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .widget-box {
            background-color: #ffffff;
            border-radius: 24px; 
            box-shadow: 0px 8px 30px rgba(120, 80, 180, 0.05); 
            width: 260px;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .icon {
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.85rem;
            font-weight: 600;
            color: #a58fd6;
            text-transform: lowercase;
            margin-bottom: 5px;
        }

        .week-number {
            font-size: 3.5rem;
            font-weight: 700;
            color: #7850b4;
            line-height: 1;
            margin-bottom: 12px;
            font-variant-numeric: tabular-nums;
        }

        .status-pill {
            background-color: #fcfaff;
            border: 1px solid #e3d8f8;
            color: #8c73c8;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: lowercase;
        }
    </style>
</head>
<body>
    
    <div class="centrador">
        <div class="widget-box">
            <div class="icon">📝</div>
            <div class="subtitle">produzindo conteúdo para a</div>
            <div class="week-number" id="week-display">--</div>
            <div class="status-pill">foco no futuro</div>
        </div>
    </div>

    <script>
        function getNextWeekNumber() {
            const today = new Date();
            
            // Adiciona exatos 7 dias à data de hoje para "pular" para a semana que vem
            const nextWeek = new Date(today.getTime() + 7 * 24 * 60 * 60 * 1000);
            
            // Lógica oficial para descobrir o número da semana (Padrão ISO 8601)
            const target = new Date(nextWeek.valueOf());
            const dayNr = (nextWeek.getDay() + 6) % 7;
            target.setDate(target.getDate() - dayNr + 3);
            const firstThursday = target.valueOf();
            target.setMonth(0, 1);
            
            if (target.getDay() !== 4) {
                target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
            }
            
            return 1 + Math.ceil((firstThursday - target) / 604800000);
        }
        
        // Atualiza o texto na tela
        document.getElementById('week-display').textContent = 'semana ' + getNextWeekNumber();
    </script>
</body>
</html>
