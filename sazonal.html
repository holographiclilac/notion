<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sazonalidade - Itajubá</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .centrador {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .widget-box {
            background-color: #ffffff;
            border-radius: 16px; 
            box-shadow: 0px 4px 20px rgba(120, 80, 180, 0.08); 
            width: 340px; /* Um pouquinho mais largo para caber mais pills */
            max-height: 95%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- CABEÇALHO --- */
        .header {
            background-color: #c9b8e8;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            padding: 15px 20px;
            position: relative;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .header button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #ffffff;
            font-size: 1.2rem;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
        }

        .header button:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .month-name {
            font-size: 1.3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .season-name {
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 5px;
            color: #fcfaff;
            opacity: 0.9;
        }

        /* --- CORPO DA LISTA --- */
        .content {
            padding: 15px 20px 25px 20px;
            overflow-y: auto; 
            scrollbar-width: thin; 
            scrollbar-color: #e3d8f8 transparent;
        }
        .content::-webkit-scrollbar {
            width: 6px;
        }
        .content::-webkit-scrollbar-thumb {
            background-color: #e3d8f8;
            border-radius: 10px;
        }

        .category-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #a58fd6;
            margin-top: 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .category-title:first-child {
            margin-top: 0;
        }

        .items-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .item-pill {
            background-color: #fcfaff;
            color: #8c73c8;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(201, 184, 232, 0.4);
            transition: transform 0.2s ease, background-color 0.2s ease;
            cursor: default;
        }

        .item-pill:hover {
            background-color: #e3d8f8;
            transform: translateY(-2px);
        }

    </style>
</head>

            <div class="content" id="content-display">
