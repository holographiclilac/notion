<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semana Atual</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: #c9b8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', Georgia, serif;
      min-height: 100vh;
    }

    .widget {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .label {
      color: rgba(255, 255, 255, 0.75);
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 400;
    }

    .number {
      color: #ffffff;
      font-size: 3.8rem;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 16px rgba(120, 80, 180, 0.25);
    }

    .divider {
      width: 32px;
      height: 1.5px;
      background: rgba(255, 255, 255, 0.45);
      margin: 6px 0;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="widget">
    <span class="label">semana</span>
    <div class="divider"></div>
    <span class="number" id="week-number">—</span>
  </div>

  <script>
    function getWeekNumber(date) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    const week = getWeekNumber(new Date());
    document.getElementById('week-number').textContent = String(week).padStart(2, '0');
  </script>
</body>
</html>
