<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semana Atual - Inline</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet" />
  
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'Quicksand', sans-serif;
    }

    /* Caixa principal com fundo branco e sombra fofa */
    .container-arredondado {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ffffff; 
      border-radius: 16px; 
      box-shadow: 0px 4px 20px rgba(120, 80, 180, 0.08); 
      overflow: hidden;
      
      /* Configuração para colocar os itens lado a lado */
      display: flex;
      flex-direction: row; 
      align-items: baseline; /* Alinha a base da palavra com a base do número */
      justify-content: center;
      gap: 12px; /* Espaço entre a palavra e o número */
    }

    .label {
      color: #c9b8e8; /* Lilás clarinho */
      font-size: 1.8rem;
      font-weight: 500;
      text-transform: lowercase; 
    }

    .number {
      color: #a58fd6; /* Lilás um pouco mais forte para o número brilhar */
      font-size: 3.5rem; /* Número grandão */
      font-weight: 700; /* Negrito */
      line-height: 1;
    }
  </style>
</head>
<body>
  
  <div class="container-arredondado">
    <span class="label">semana</span>
    <span class="number" id="week-number">—</span>
  </div>

  <script>
    function getWeekNumber(date) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    const week = getWeekNumber(new Date());
    document.getElementById('week-number').textContent = String(week).padStart(2, '0');
  </script>
</body>
</html>
