<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
        /* Reseta a página para ocupar 100% sem barras de rolagem */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden; /* Corta qualquer borda fantasma */
            font-family: 'Playfair Display', Georgia, serif;
        }

        /* Essa é a "caixa mágica" que força o centro exato no Notion */
        .centrador {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #calendari {
            height: 330px; 
            width: 350px; 
            font-size: 14px;
            position: relative;
            transform: scale(0.75); /* A sua redução de 25% */
            transform-origin: center center; 
        }

        table {
            border-collapse: separate; 
            border-spacing: 0;
            table-layout: fixed;
            box-shadow: 0px 2px 16px rgba(0, 0, 0, 0.05);
            background-color: #ffffff;
            position: absolute;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
        }

        td, th {
            text-align: center;
            background-color: #ffffff;
        }

        th {
            padding: 10px;
            background-color: #c9b8e8;
            color: #fff;
            text-shadow: 0px -1px 0px rgba(0,0,0,0.05);
            font-weight: normal;
        }

        tr:first-child th {
            font-size: 20px;
            font-weight: 600;
        }

        th .any {
            font-size: 12px;
            font-weight: normal;
            display: block;
            text-shadow: none;
            color: rgba(255,255,255,0.8);
        }

        tr:nth-child(2) th {
            padding: 5px;
            border-bottom: 1px solid rgba(201, 184, 232, 0.3);
        }

        td {
            padding: 0;
            border-bottom: 1px solid rgba(201, 184, 232, 0.15);
        }

        tr:last-child td {
            border-bottom: none;
        }

        td>span {
            color: #c9b8e8;
            font-weight: 500;
            padding: 10px;
            display: block;
            border: 2px solid transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        td:nth-child(even)>span {
            background-color: rgba(201, 184, 232, 0.08);
        }

        td:last-child>span,
        td:nth-child(6)>span {
            color: #a58fd6;
            font-weight: 600;
        }

        td.avui>span {
            font-weight: bold;
            background-color: #c9b8e8;
            color: #fff;
            border-radius: 4px; 
        }

        td.fora > span {
            opacity: 0.35;
        }

        td > span:hover {
            background: #e3d8f8;
            color: #a58fd6;
            cursor: pointer;
            border-radius: 4px; 
        }

        .boto-next, .boto-prev {
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
            font-family: inherit;
            border: none;
            font-size: 18px;
            font-weight: bold;
            padding: 2px 10px 5px 10px;
            line-height: 1px;
            height: 30px;
            width: 30px;
            vertical-align: middle;
            border-radius: 100%;
            position: absolute;
            top: 15px;
            transition: background 0.3s;
        }

        .boto-next { right: 10px; padding-left: 13px; }
        .boto-prev { left: 10px; padding-right: 13px;}
        
        .boto-next:hover,
        .boto-prev:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        button:hover { cursor: pointer; }
        button:focus { outline: none; }

    </style>
</head>
<body>
    
    <div class="centrador">
        <div id="calendari"></div>
    </div>

    <script>
        var mesos = [
            'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
            'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'
        ];

        var dies_abr = [
            'Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'
        ];

        Number.prototype.pad = function(num) {
            var str = '';
            for(var i = 0; i < (num-this.toString().length); i++)
                str += '0';
            return str += this.toString();
        }

        function calendari(widget, data) {
            var original = widget.getElementsByClassName('actiu')[0];

            if(typeof original === 'undefined') {
                original = document.createElement('table');
                original.setAttribute('data-actual',
                      data.getFullYear() + '/' +
                      data.getMonth().pad(2) + '/' +
                      data.getDate().pad(2))
                widget.appendChild(original);
            }

            var diff = data - new Date(original.getAttribute('data-actual'));
            diff = new Date(diff).getMonth();

            var e = document.createElement('table');
            e.className = diff  === 0 ? 'amagat-esquerra' : 'amagat-dreta';
            e.innerHTML = '';
            widget.appendChild(e);

            e.setAttribute('data-actual',
                           data.getFullYear() + '/' +
                           data.getMonth().pad(2) + '/' +
                           data.getDate().pad(2))

            var fila = document.createElement('tr');
            var titol = document.createElement('th');
            titol.setAttribute('colspan', 7);

            var boto_prev = document.createElement('button');
            boto_prev.className = 'boto-prev';
            boto_prev.innerHTML = '&#9666;';

            var boto_next = document.createElement('button');
            boto_next.className = 'boto-next';
            boto_next.innerHTML = '&#9656;';

            titol.appendChild(boto_prev);
            titol.appendChild(document.createElement('span')).innerHTML = 
                mesos[data.getMonth()] + '<span class="any">' + data.getFullYear() + '</span>';
            titol.appendChild(boto_next);

            boto_prev.onclick = function() {
                data.setMonth(data.getMonth() - 1);
                calendari(widget, data);
            };

            boto_next.onclick = function() {
                data.setMonth(data.getMonth() + 1);
                calendari(widget, data);
            };

            fila.appendChild(titol);
            e.appendChild(fila);

            fila = document.createElement('tr');

            for(var i = 1; i < 7; i++) {
                fila.innerHTML += '<th>' + dies_abr[i] + '</th>';
            }
            fila.innerHTML += '<th>' + dies_abr[0] + '</th>';
            e.appendChild(fila);

            var inici_mes = new Date(data.getFullYear(), data.getMonth(), -1).getDay();
            var actual = new Date(data.getFullYear(), data.getMonth(), -inici_mes);

            for(var s = 0; s < 6; s++) {
                var fila = document.createElement('tr');

                for(var d = 1; d < 8; d++) {
                    var cela = document.createElement('td');
                    var span = document.createElement('span');

                    cela.appendChild(span);
                    span.innerHTML = actual.getDate();

                    let anoGoogle = actual.getFullYear();
                    let mesGoogle = (actual.getMonth() + 1).pad(2); 
                    let diaGoogle = actual.getDate().pad(2);

                    span.onclick = function() {
                        let url = 'https://calendar.google.com/calendar/u/0/r/day/' + anoGoogle + '/' + mesGoogle + '/' + diaGoogle;
                        window.open(url, '_blank');
                    };

                    if(actual.getMonth() !== data.getMonth())
                        cela.className = 'fora';

                    if(data.getDate() == actual.getDate() && data.getMonth() == actual.getMonth())
                        cela.className = 'avui';

                    actual.setDate(actual.getDate()+1);
                    fila.appendChild(cela);
                }
                e.appendChild(fila);
            }

            setTimeout(function() {
                e.className = 'actiu';
                original.className += diff === 0 ? ' amagat-dreta' : ' amagat-esquerra';
            }, 20);

            original.className = 'inactiu';

            setTimeout(function() {
                var inactius = document.getElementsByClassName('inactiu');
                for(var i = 0; i < inactius.length; i++)
                    widget.removeChild(inactius[i]);
            }, 1000);
        }

        calendari(document.getElementById('calendari'), new Date());
    </script>
</body>
</html>
