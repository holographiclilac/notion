<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
        html {
            background: transparent;
        }

        body {
            font-family: 'Playfair Display', Georgia, serif;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }

        .wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            min-height: 100%;
        }

        button::-moz-focus-inner { 
            border: 0;
            padding: 0;
        }

        #calendari {
            margin: 0 auto;
            height: 330px; 
            width: 350px; 
            font-size: 14px;
            position: relative;
            
            /* --- REDUÇÃO DE 25% APLICADA AQUI --- */
            transform: scale(0.75);
            transform-origin: center; 
            /* ------------------------------------ */
        }

        table {
            border-collapse: separate; 
            border-spacing: 0;
            table-layout: fixed;
            box-shadow: 0px 2px 16px rgba(0, 0, 0, 0.05);
            background-color: #ffffff;
            position: absolute;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
        }

        td, th {
            text-align: center;
            background-color: #ffffff;
        }

        th {
            padding: 10px;
            background-color: #c9b8e8;
            color: #fff;
            text-shadow: 0px -1px 0px rgba(0,0,0,0.05);
            font-weight: normal;
        }

        tr:first-child th {
            font-size: 20px;
            font-weight: 600;
        }

        th .any {
            font-size: 12px;
            font-weight: normal;
            display: block;
            text-shadow: none;
            color: rgba(255,255,255,0.8);
        }

        tr:nth-child(2) th {
            padding: 5px;
            border-bottom: 1px solid rgba(201, 184, 232, 0.3);
        }

        td {
            padding: 0;
            border-bottom: 1px solid rgba(201, 184, 232, 0.15);
        }

        tr:last-child td {
            border-bottom: none;
        }

        td>span {
            color: #c9b8e8;
            font-weight: 500;
            padding: 10px;
            display: block;
            border: 2px solid transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        td:nth-child(even)>span {
            background-color: rgba(201, 184, 232, 0.08);
        }

        td:last-child>span,
        td:nth-child(6)>span {
            color: #a58fd6;
            font-weight: 600;
        }

        td.avui>span {
            font-weight: bold;
            background-color: #c9b8e8;
            color: #fff;
            border-radius: 4px; 
        }

        td.fora > span {
            opacity: 0.35;
        }

        td > span:hover {
            background: #e3d8f8;
            color: #a58fd6;
            cursor: pointer;
        }

        .boto-next, .boto-prev {
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
            font-family: inherit;
            border: none;
            font-size: 18px;
            font-weight: bold;
            padding: 2px 10px 5px 10px;
            line-height: 1px;
            height: 30px;
            width: 30px;
            vertical-align: middle;
            border-radius: 100%;
            position: absolute;
            top: 15px;
            transition: background 0.3s;
        }
