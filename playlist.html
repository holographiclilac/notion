<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playlist YouTube</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    /* Nossa caixa estética */
    .video-container {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 16px; /* Cantinhos redondos */
      box-shadow: 0px 4px 20px rgba(120, 80, 180, 0.08);
      overflow: hidden;
      background-color: #fcfaff; /* Um fundinho quase branco pro YouTube não ficar "flutuando" antes de carregar */
    }

    /* O player do YouTube */
    iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  
  <div class="video-container">
    <iframe 
      src="https://www.youtube.com/playlist?list=PLi6mPyxR0x2txV-Yq1fRkfi99C5EYNRbx" 
      allow="autoplay; encrypted-media" 
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
